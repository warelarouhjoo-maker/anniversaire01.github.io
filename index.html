<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Joyeux Anniversaire !</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:    #ff6b9d;
    --gold:    #ffd166;
    --coral:   #ff9a76;
    --violet:  #c77dff;
    --cream:   #fff8f0;
    --dark:    #2d1b33;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quicksand', sans-serif;
    background: var(--cream);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ========== CONFETTI ========== */
  #confetti-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 14px;
    opacity: 0;
    animation: confetti-fall linear infinite;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ========== PAGE 1 ========== */
  #page1 {
    position: relative;
    height: 100vh; width: 100vw;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #fff0f8 0%, #fff8e7 50%, #f3eaff 100%);
    z-index: 1;
    transition: opacity .6s ease, transform .6s ease;
  }

  /* --- Alerte animée (banner du haut) --- */
  #alert-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: linear-gradient(90deg, var(--rose), var(--violet), var(--gold), var(--rose));
    background-size: 300% 100%;
    animation: banner-slide 3s ease-out forwards, gradient-shift 2s linear infinite;
    transform: translateY(-100%);
    z-index: 100;
    text-align: center;
    padding: 16px;
    box-shadow: 0 4px 30px rgba(255,107,157,.4);
  }
  @keyframes banner-slide {
    0%   { transform: translateY(-100%); }
    100% { transform: translateY(0); }
  }
  @keyframes gradient-shift {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  #alert-banner p {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,.2);
    letter-spacing: 1px;
    animation: pulse-text 1s ease-in-out infinite alternate;
  }
  @keyframes pulse-text {
    from { transform: scale(1); }
    to   { transform: scale(1.04); }
  }
  #alert-banner .emoji { animation: spin-emoji 2s linear infinite; display: inline-block; }
  @keyframes spin-emoji {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* --- Carte principale --- */
  #main-card {
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(16px);
    border-radius: 32px;
    padding: clamp(32px, 6vw, 64px) clamp(28px, 6vw, 72px);
    text-align: center;
    box-shadow: 0 24px 80px rgba(255,107,157,.18), 0 2px 8px rgba(0,0,0,.06);
    border: 2px solid rgba(255,107,157,.12);
    max-width: 520px;
    width: 90%;
    opacity: 0;
    transform: translateY(30px) scale(.96);
    transition: opacity .7s ease, transform .7s ease;
  }
  #main-card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .cake-icon {
    font-size: clamp(3rem, 10vw, 5rem);
    animation: cake-bounce .7s ease-in-out infinite alternate;
    display: block; margin-bottom: 12px;
  }
  @keyframes cake-bounce {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-8px) scale(1.06); }
  }

  #main-card h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 7vw, 3.4rem);
    background: linear-gradient(90deg, var(--rose), var(--violet));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.2; margin-bottom: 6px;
  }
  #main-card .subtitle {
    font-size: clamp(.9rem, 2.5vw, 1.1rem);
    color: #a07090;
    margin-bottom: 28px;
    font-style: italic;
  }

  /* Question cadeau */
  #gift-question {
    background: linear-gradient(135deg, #fff0f8, #f7eeff);
    border-radius: 20px;
    padding: 24px 20px;
    border: 1.5px dashed var(--rose);
    margin-top: 12px;
  }
  #gift-question p {
    font-size: clamp(1rem, 3vw, 1.2rem);
    color: var(--dark);
    margin-bottom: 20px;
    font-weight: 600;
    line-height: 1.5;
  }

  .btn-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    position: relative;
    height: 56px;
  }

  .btn {
    padding: 12px 32px;
    border: none;
    border-radius: 50px;
    font-family: 'Quicksand', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  #btn-oui {
    background: linear-gradient(135deg, var(--rose), var(--violet));
    color: #fff;
    box-shadow: 0 6px 20px rgba(255,107,157,.4);
    position: fixed; /* sera repositionné en JS */
    z-index: 200;
  }
  #btn-non {
    background: linear-gradient(135deg, var(--gold), var(--coral));
    color: #fff;
    box-shadow: 0 6px 20px rgba(255,209,102,.4);
    position: relative;
    z-index: 200;
  }
  #btn-non:hover { transform: scale(1.08); box-shadow: 0 10px 28px rgba(255,154,118,.5); }

  /* ========== PAGE 2 ========== */
  #page2 {
    display: none;
    position: fixed; inset: 0; z-index: 50;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b33 40%, #0d1f3c 100%);
    align-items: center; justify-content: center;
    overflow: hidden;
    animation: page2-in .8s ease forwards;
  }
  #page2.active { display: flex; }
  @keyframes page2-in {
    from { opacity: 0; transform: scale(.9); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Étoiles de fond */
  .star {
    position: absolute;
    width: 3px; height: 3px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur, 2s) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: .2; transform: scale(1); }
    to   { opacity: 1;  transform: scale(1.6); }
  }

  /* Cadre photo */
  #photo-wrapper {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 28px;
    z-index: 2;
    text-align: center;
    padding: 20px;
  }

  #photo-frame {
    position: relative;
    width: clamp(220px, 55vw, 380px);
    height: clamp(220px, 55vw, 380px);
    display: flex; align-items: center; justify-content: center;
  }

  /* Cercles tournants */
  .ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 3px solid transparent;
    animation: ring-spin var(--s, 6s) linear infinite;
  }
  .ring:nth-child(1) {
    border-top-color: var(--rose);
    border-right-color: var(--violet);
    --s: 5s;
  }
  .ring:nth-child(2) {
    inset: 10px;
    border-bottom-color: var(--gold);
    border-left-color: var(--coral);
    --s: 7s;
    animation-direction: reverse;
  }
  .ring:nth-child(3) {
    inset: 20px;
    border-top-color: var(--violet);
    border-right-color: var(--gold);
    --s: 4s;
  }
  @keyframes ring-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Photo elle-même */
  #the-photo {
    width: calc(100% - 64px);
    height: calc(100% - 64px);
    border-radius: 50%;
    object-fit: cover;
    position: relative; z-index: 1;
    box-shadow:
      0 0 0 4px rgba(255,107,157,.4),
      0 0 40px rgba(199,125,255,.5),
      0 0 80px rgba(255,209,102,.2);
    animation: photo-breathe 4s ease-in-out infinite;
  }
  @keyframes photo-breathe {
    0%, 100% { box-shadow: 0 0 0 4px rgba(255,107,157,.4), 0 0 40px rgba(199,125,255,.5), 0 0 80px rgba(255,209,102,.2); }
    50%       { box-shadow: 0 0 0 8px rgba(255,107,157,.6), 0 0 60px rgba(199,125,255,.8), 0 0 120px rgba(255,209,102,.4); }
  }

  /* Particules flottantes autour de la photo */
  .float-particle {
    position: absolute;
    font-size: clamp(1rem, 3vw, 1.6rem);
    animation: float-orbit var(--dur, 6s) linear infinite;
    transform-origin: var(--tx, 160px) var(--ty, 160px);
  }
  @keyframes float-orbit {
    from { transform: rotate(0deg) translateX(var(--r, 140px)) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(var(--r, 140px)) rotate(-360deg); }
  }

  /* Texte page 2 */
  #p2-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: #fff;
    text-shadow: 0 0 20px rgba(255,107,157,.8), 0 0 40px rgba(199,125,255,.5);
    animation: glow-text 2s ease-in-out infinite alternate;
    line-height: 1.2;
  }
  @keyframes glow-text {
    from { text-shadow: 0 0 20px rgba(255,107,157,.6), 0 0 40px rgba(199,125,255,.4); }
    to   { text-shadow: 0 0 30px rgba(255,107,157,1),  0 0 60px rgba(255,209,102,.7); }
  }
  #p2-sub {
    font-size: clamp(.85rem, 2.5vw, 1.1rem);
    color: rgba(255,255,255,.7);
    font-style: italic;
    margin-top: 6px;
  }

  /* Étoiles filantes */
  .shooting-star {
    position: fixed;
    width: 3px;
    background: linear-gradient(90deg, rgba(255,255,255,0), #fff);
    border-radius: 50%;
    animation: shoot var(--d, 2s) linear infinite;
    opacity: 0;
  }
  @keyframes shoot {
    0%   { transform: translateX(0) translateY(0) rotate(var(--angle, -30deg)); opacity: 1; width: 3px; }
    100% { transform: translateX(var(--dx, 300px)) translateY(var(--dy, 150px)) rotate(var(--angle, -30deg)); opacity: 0; width: 120px; }
  }

  /* Upload hint sur page 2 */
  #upload-hint {
    position: fixed;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 12px;
    padding: 10px 20px;
    color: rgba(255,255,255,.5);
    font-size: .8rem;
    display: flex; align-items: center; gap: 8px;
    z-index: 100;
  }
  #photo-upload-btn {
    background: var(--rose);
    border: none; border-radius: 8px;
    padding: 4px 12px;
    color: #fff; font-size: .8rem;
    cursor: pointer; font-family: 'Quicksand', sans-serif;
  }
  #photo-file-input { display: none; }
</style>
</head>
<body>

<!-- mUSIC -->


<!-- Confetti -->
<div id="confetti-container"></div>

<!-- ===== PAGE 1 ===== -->
<div id="page1">

  <div id="alert-banner">
    <p><span class="emoji"><center></center>🎉</span> &nbsp;  Alerte spéciale ! Bah ce jour est arrivé !!!! je répete ce jour est arrivé &nbsp; </center><span class="emoji">🎁</span></p>
  </div>

  <div id="main-card">
    <span class="cake-icon">🎂</span>
    <h1>Joyeux Anniversaire !</h1>
    <p class="subtitle">Profite n'oublie pas de m'invité !!!! ✨</p>

    <div id="gift-question">
        <p>Tape d'abord sur l'écran pour le son</p>
      <p>🎁 Est-ce que tu voudrais<br>un cadeau spécial aujourd'hui ?</p>
      <div class="btn-row" id="btn-row">
        <button class="btn" id="btn-oui">Oui 🥰</button>
        <button class="btn" id="btn-non" onclick="goPage2()">Non 🙈</button>
      </div>
    </div>
  </div>

</div>

<!-- ===== PAGE 2 ===== -->
  <div id="page2">
  <div id="photo-wrapper">
    <div>
      <div id="p2-title">Bahhhhhhhh !</div>
      <div id="p2-sub">Joyeux anniversaire, ....... 🌟</div>
    </div>

    <div id="photo-frame">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <img id="the-photo" src="A1.jpg" alt="Photo d'anniversaire">
    </div>
  </div>

</div>

<script>
    /* ----music ---- */
const btn = document.getElementById("btn-non");
const audio = new Audio("A2.mp3"); // crée l'audio une seule fois
audio.loop = true;

btn.addEventListener("click", function () {
  if (audio.paused) {      // si la musique est en pause
    audio.play();           // on joue
    btn.textContent = "⏸️ Pause"; // change le texte du bouton
  } else {
    audio.pause();          // sinon on met en pause
    btn.textContent = "🎵 Lancer";
  }
});
  /* ---- Confetti ---- */
  const colors = ['#ff6b9d','#ffd166','#c77dff','#ff9a76','#06d6a0','#118ab2'];
  const shapes = ['●','■','▲','★','♦'];
  const cc = document.getElementById('confetti-container');
  for(let i=0;i<60;i++){
    const el = document.createElement('div');
    el.className='confetti-piece';
    el.textContent=shapes[Math.floor(Math.random()*shapes.length)];
    el.style.cssText=`
      left:${Math.random()*100}%;
      color:${colors[Math.floor(Math.random()*colors.length)]};
      font-size:${8+Math.random()*12}px;
      animation-duration:${3+Math.random()*6}s;
      animation-delay:${Math.random()*6}s;
    `;
    cc.appendChild(el);
  }

  /* ---- Affiche la carte après 5s ---- */
  const card = document.getElementById('main-card');
  const btnOui = document.getElementById('btn-oui');

  setTimeout(()=>{
    card.classList.add('visible');
    // Positionner btn-oui en fixed sur son emplacement initial
    placeOuiOnBtn();
  }, 5000);

  function placeOuiOnBtn(){
    const row = document.getElementById('btn-row');
    const rect = row.getBoundingClientRect();
    btnOui.style.top  = rect.top  + 'px';
    btnOui.style.left = rect.left + 'px';
    btnOui.style.position = 'fixed';
  }

  /* ---- Bouton OUI s'échappe ---- */
  const margin = 20;
  btnOui.addEventListener('mouseenter', escapeBtn);
  btnOui.addEventListener('mousemove', escapeBtn);
  btnOui.addEventListener('touchstart', escapeBtn, {passive:true});

  function escapeBtn(){
    const bw = btnOui.offsetWidth, bh = btnOui.offsetHeight;
    const maxX = window.innerWidth  - bw - margin;
    const maxY = window.innerHeight - bh - margin;
    const nx = margin + Math.random() * maxX;
    const ny = margin + Math.random() * maxY;
    btnOui.style.transition='top .25s cubic-bezier(.68,-0.55,.27,1.55), left .25s cubic-bezier(.68,-0.55,.27,1.55)';
    btnOui.style.top  = ny + 'px';
    btnOui.style.left = nx + 'px';
  }

  /* ---- Transition vers page 2 ---- */
  function goPage2(){
    const p1 = document.getElementById('page1');
    p1.style.opacity='0'; p1.style.transform='scale(1.05)';
    setTimeout(()=>{
      p1.style.display='none';
      const p2 = document.getElementById('page2');
      p2.classList.add('active');
      buildStars();
      buildParticles();
      buildShootingStars();
    }, 600);
  }

  /* ---- Étoiles de fond ---- */
  function buildStars(){
    const p2 = document.getElementById('page2');
    for(let i=0;i<120;i++){
      const s=document.createElement('div');
      s.className='star';
      s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${1+Math.random()*3}s;animation-delay:${Math.random()*3}s;opacity:${.2+Math.random()*.8}`;
      p2.appendChild(s);
    }
  }

  /* ---- Particules orbitales ---- */
  const emojis = ['🌸','✨','💖','🌟','🎀','💫','🦋','🌺','🎊','🍭'];
  function buildParticles(){
    const frame = document.getElementById('photo-frame');
    const cx = frame.offsetWidth/2, cy = frame.offsetHeight/2;
    emojis.forEach((em,i)=>{
      const el = document.createElement('div');
      el.className='float-particle';
      el.textContent=em;
      const r = 160 + (i%2)*30;
      el.style.cssText=`
        --r:${r}px;
        --tx:${cx}px;
        --ty:${cy}px;
        top:50%; left:50%;
        margin-top:-1em; margin-left:-.5em;
        --dur:${5+i*1.2}s;
        animation-delay:${-i*1.1}s;
      `;
      frame.appendChild(el);
    });
  }

  /* ---- Étoiles filantes ---- */
  function buildShootingStars(){
    for(let i=0;i<6;i++){
      const s=document.createElement('div');
      s.className='shooting-star';
      const angle=-20-Math.random()*40;
      const rad=angle*Math.PI/180;
      const dist=200+Math.random()*300;
      s.style.cssText=`
        top:${Math.random()*60}%;
        left:${Math.random()*80}%;
        height:2px;
        --angle:${angle}deg;
        --dx:${Math.cos(rad)*dist}px;
        --dy:${Math.sin(rad)*dist}px;
        --d:${2+Math.random()*4}s;
        animation-delay:${Math.random()*6}s;
      `;
      document.getElementById('page2').appendChild(s);
    }
  }

  /* ---- Chargement photo perso ---- */
  function loadPhoto(e){
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      document.getElementById('the-photo').src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }
</script>
</body>
</html>
